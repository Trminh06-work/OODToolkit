# Comma-separated module names from src/splitters and src/models.
MODULES="geometric_split,marginal_distribution_shift,random_split,statistical_models,tree_models,resnet"

# Comma-separated splitter class names. Leave empty to skip splitting.
SPLITTERS=""

# Comma-separated model class names. Leave empty to skip model training.
MODELS="HuberLinearRegressor,HuberPolynomialRegressor,KNNRegressor,SVMRegressor,
        DTRegressor,RFRegressor,GBRegressor,ABRegressor,XGBRegressor,LightGBMRegressor,
        ResnetRegressor"

# Run the evaluation stage after splitting/training: true or false.
REQUIRE_EVAL="true"

# In split-wise tests, compare only baseline models: true or false.
SPLITWISE_BASELINE_ONLY="false"

# In split-wise tests, include model variants as competitors: true or false.
SPLITWISE_INCLUDE_VARIANTS="true"

# Comma-separated dataset names. Leave empty to use all datasets found under data/raw.
DATASET_NAMES="bike"

# Python executable to use inside the batch job.
PYTHON_BIN="python"

# Conda environment to activate before running the toolkit.
CONDA_ENV_NAME="jupyter_env"

# Comma-separated module names from src/splitters and src/models.
MODULES="geometric_split,marginal_distribution_shift,random_split,statistical_models,tree_models,resnet,slip_interpolant"

# Comma-separated splitter class names. Leave empty to skip splitting.
SPLITTERS=""

# Comma-separated model class names. Leave empty when using CPU_MODELS/GPU_MODELS mixed mode.
# Example (single-pass mode): MODELS="SLipInterpolant,RFRegressor"
MODELS="SLipInterpolant"

# Available model names:
# HuberLinearRegressor, HuberPolynomialRegressor, SVMRegressor, KNNRegressor,
# DTRegressor, RFRegressor, GBRegressor, ABRegressor, XGBRegressor, LightGBMRegressor,
# ResnetRegressor, SLipInterpolant

# Comma-separated CPU-only model class names. When set (with or without GPU_MODELS),
# bash.sh runs split once, then this CPU phase with CUDA hidden.
# CPU_MODELS="HuberLinearRegressor,HuberPolynomialRegressor,SVMRegressor,KNNRegressor,DTRegressor,RFRegressor,GBRegressor,ABRegressor,XGBRegressor,SLipInterpolant"
CPU_MODELS=""

# Comma-separated GPU-capable model class names. When set (with or without CPU_MODELS),
# bash.sh runs this as a separate GPU-visible phase.
# GPU_MODELS="LightGBMRegressor,ResnetRegressor"
GPU_MODELS=""

# Optional Slurm-array sharding over models. Each array task picks one value from this list
# using SLURM_ARRAY_TASK_ID and runs only that model.
# ARRAY_MODELS="HuberLinearRegressor,HuberPolynomialRegressor,SVMRegressor,KNNRegressor,DTRegressor,RFRegressor,GBRegressor,ABRegressor,XGBRegressor,LightGBMRegressor,SLipInterpolant,ResnetRegressor"
ARRAY_MODELS=""

# Optional Slurm-array sharding over datasets. Each array task picks one value from this list
# using SLURM_ARRAY_TASK_ID and overrides DATASET_NAMES with only that dataset.
# ARRAY_DATASETS="synthetic_0-10000K-10d,synthetic_1-10000K-10d,synthetic_2-10000K-10d"
ARRAY_DATASETS=""

# Run the evaluation stage after splitting/training: true or false.
REQUIRE_EVAL="false"

# In split-wise tests, compare only baseline models: true or false.
SPLITWISE_BASELINE_ONLY="false"

# In split-wise tests, include model variants as competitors: true or false.
SPLITWISE_INCLUDE_VARIANTS="true"

# Run model-wise tests that compare split types for each model: true or false.
MODELWISE_EVAL="true"

# Print one full per-dataset nRMSE table (models x splits): true or false.
PER_DATASET_TABLE_EVAL="true"

# Comma-separated dataset names. Leave empty to use all datasets found under data/raw.
DATASET_NAMES="synthetic_0-10000K-10d,synthetic_0-100000K-10d,synthetic_1-10000K-10d,synthetic_1-100000K-10d,synthetic_2-10000K-10d,synthetic_2-100000K-10d,synthetic_3-10000K-10d,synthetic_3-100000K-10d,synthetic_4-10000K-10d,synthetic_4-100000K-10d,synthetic_5-10000K-10d,synthetic_5-100000K-10d,synthetic_6-10000K-10d,synthetic_6-100000K-10d,synthetic_7-10000K-10d,synthetic_7-100000K-10d"
# report_1 DATASET_NAMES = "synthetic_0,synthetic_1,synthetic_2,synthetic_3,synthetic_4,synthetic_5"
# DATASET_NAMES="synthetic_7-10000K-10d,synthetic_7-100000K-10d"

# Python executable to use inside the batch job.
PYTHON_BIN="python"

# Conda environment to activate before running the toolkit.
CONDA_ENV_NAME="jupyter_env"
